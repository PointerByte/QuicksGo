syntax = "proto3";

option go_package = "/proto";

package helloworld;

// The greeting service definition.
service Greeter {
  // Sends a greeting
  rpc SayHello (HelloRequest) returns (HelloReply) {}

  // Receives a sequence of chat messages and returns a summary when the client finishes sending.
  rpc CreateChat (stream ChatMessage) returns (ChatSummary) {}

  // Exchanges alert messages in both directions in real time.
  rpc StreamAlerts (stream AlertMessage) returns (stream AlertMessage) {}
}

// The request message containing the user's name.
message HelloRequest {
  string name = 1;
}

// The response message containing the greetings
message HelloReply {
  string message = 1;
}

// A single chat message sent by the client during a chat session.
message ChatMessage {
  string user = 1;
  string message = 2;
  int64 sent_at_unix = 3;
}

// Summary returned when a client-streaming chat session ends.
message ChatSummary {
  string chat_id = 1;
  int32 total_messages = 2;
  string last_message = 3;
}

// Alert event used in bidirectional streaming tests.
message AlertMessage {
  string alert_id = 1;
  string source = 2;
  string level = 3;
  string message = 4;
  int64 created_at_unix = 5;
}
