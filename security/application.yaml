jwt:
  enable: true
  algorithm: HS256
  hmac:
    algorithm: HS256
    secret: "replace-with-your-hmac-secret"
  rsa:
    algorithm: RS256
    private_key: "./certs/jwt/key.pem"
    public_key: "./certs/jwt/public.pem"
encrypt:
  aws-kms:
    arn: ""
  azure-key-vault:
    key-id: ""
  gcp-kms:
    key-id: ""
